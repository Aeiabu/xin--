<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六一惊喜信件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* 漂浮气球 */
        .balloon {
            position: absolute;
            width: 50px;
            height: 70px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.8;
            animation: float 5s ease-in-out infinite;
        }
        .balloon::after{
            content:"";
            position:absolute;
            bottom:-18px;
            left:50%;
            width:2px;
            height:25px;
            background:#999;
            transform:translateX(-50%);
        }
        .b1{background:#ff6b6b;top:8%;left:8%;animation-delay:0s;}
        .b2{background:#4ecdc4;top:18%;right:12%;animation-delay:1s;}
        .b3{background:#ffe66d;bottom:12%;left:15%;animation-delay:2s;}
        .b4{background:#ff9ff3;bottom:20%;right:8%;animation-delay:3s;}
        @keyframes float{
            0%,100%{transform:translateY(0) rotate(-4deg);}
            50%{transform:translateY(-18px) rotate(4deg);}
        }
        /* 信封主体 */
        .envelope {
            width: 360px;
            height: 260px;
            background: #fff5e6;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(0,0,0,0.18);
            z-index: 10;
        }
        .envelope:hover{transform: translateY(-6px);}
        .envelope-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            clip-path: polygon(0 0, 50% 42%, 100% 0, 100% 100%, 0 100%);
            border-radius: 10px 10px 0 0;
            transition: all 0.8s ease;
            z-index: 2;
        }
        .tip-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-size: 17px;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            z-index:3;
        }
        /* 信纸 */
        .letter {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
            background: #fff;
            padding: 25px;
            border-radius: 6px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            opacity: 0;
            transition: all 0.8s ease 0.2s;
            z-index: 1;
            overflow-y: auto;
        }
        .letter p {
            font-size: 15px;
            line-height: 1.7;
            color: #555;
            margin-bottom: 12px;
        }
        .sign{
            text-align: right;
            margin-top: 20px;
            color:#777;
            font-style: italic;
        }
        /* 开启状态 */
        .envelope.open .envelope-top{
            clip-path: polygon(0 0, 50% 0, 100% 0, 100% 0, 0 0);
        }
        .envelope.open .letter{
            top: -160px;
            opacity: 1;
            transform: translateX(-50%) scale(1.03);
        }
        /* 飘落特效 */
        .fall-item{
            position:absolute;
            font-size:18px;
            animation: fall 4s linear infinite;
            opacity:0.9;
        }
        @keyframes fall{
            0%{transform:translateY(-8vh) rotate(0deg);opacity:0;}
            10%{opacity:0.9;}
            90%{opacity:0.9;}
            100%{transform:translateY(105vh) rotate(360deg);opacity:0;}
        }
    </style>
</head>
<body>
    <!-- 气球 -->
    <div class="balloon b1"></div>
    <div class="balloon b2"></div>
    <div class="balloon b3"></div>
    <div class="balloon b4"></div>

    <!-- 信封 -->
    <div class="envelope" onclick="openBox()">
        <div class="envelope-top"></div>
        <div class="tip-text">🎈 点击开启六一惊喜 🎈</div>
        <div class="letter">
            <p>🎈一树栀花盛放，满心欢喜相赠🎈</p >
            <p>愿陈学姐，童心未泯，快乐不止今天✨</p >
            <p>还有什么时候去锻炼呢，就你这个身体素质</p >
            <p class="sign">—— 一份来自小小学弟的心意</p >
        </div>
    </div>

<script>
let played = false;
function openBox(){
    const env = document.querySelector('.envelope');
    env.classList.add('open');
    createFall();
    if(!played){
        document.getElementById('bgm').play();
        played = true;
    }
}
function createFall(){
    for(let i=0;i<20;i++){
        setTimeout(()=>{
            let el = document.createElement('div');
            el.className = 'fall-item';
            let arr = ['⭐','🍬','🍭'];
            el.innerText = arr[Math.floor(Math.random()*arr.length)];
            el.style.left = Math.random()*100 + 'vw';
            el.style.animationDuration = (Math.random()*2.5 + 2) + 's';
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),4000);
        },i*80);
    }
}
</script>

<!-- 背景音乐：刚好遇见你 -->
<audio id="bgm" loop hidden>
    <source src="https://freetestdata.com/wp-content/uploads/2021/09/Free_Test_Data_100KB_MP3.mp3" type="audio/mpeg">

</body>
</html>
